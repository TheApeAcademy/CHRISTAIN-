<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d0018"/>
      <stop offset="100%" stop-color="#08000f"/>
    </linearGradient>
    <linearGradient id="glyph" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="50%" stop-color="#d946ef"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="45%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="#ec4899" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur-glow">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Squircle background -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>

  <!-- Ambient glow layer -->
  <ellipse cx="256" cy="248" rx="200" ry="190" fill="url(#glow)"/>

  <!-- Decorative arc ring -->
  <circle cx="256" cy="248" r="168" fill="none" stroke="url(#glyph)" stroke-width="1.5" stroke-opacity="0.18"/>
  <circle cx="256" cy="248" r="152" fill="none" stroke="url(#glyph)" stroke-width="0.8" stroke-opacity="0.10"/>

  <!-- CP monogram -->
  <text
    x="256" y="322"
    font-family="Georgia, 'Palatino Linotype', serif"
    font-size="248"
    font-weight="900"
    font-style="normal"
    text-anchor="middle"
    fill="url(#glyph)"
    letter-spacing="-12"
    filter="url(#blur-glow)"
    opacity="0.22"
  >CP</text>
  <text
    x="256" y="322"
    font-family="Georgia, 'Palatino Linotype', serif"
    font-size="248"
    font-weight="900"
    text-anchor="middle"
    fill="url(#glyph)"
    letter-spacing="-12"
  >CP</text>

  <!-- Dot accent -->
  <circle cx="256" cy="388" r="5" fill="url(#glyph)" opacity="0.7"/>
</svg>
